# production overlay — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Every secret below must be exported (or in .env) before `up`; Compose fails fast
# on missing values via the ${KEY:?…} substitution.
services:
  app:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required for production}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required for production}?sslmode=disable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required for production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required for production}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
