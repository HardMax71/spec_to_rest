name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: url_shortener
          POSTGRES_PASSWORD: url_shortener
          POSTGRES_DB: url_shortener
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U url_shortener" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://url_shortener:url_shortener@localhost:5432/url_shortener?sslmode=disable
      BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go vet ./...
      - run: go test ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"
      - name: Audit dependencies (govulncheck)
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Audit workflow files (zizmor)
        run: uvx zizmor==1.25.2 .github/workflows/
