# staging overlay — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# Every secret below must be exported (or in .env) before `up`; Compose fails fast
# on missing values via the ${KEY:?…} substitution.
services:
  app:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required for staging}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for staging}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required for staging}?sslmode=disable
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required for staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for staging}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required for staging}
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
