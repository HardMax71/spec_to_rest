name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.4
        env:
          MYSQL_USER: url_shortener
          MYSQL_PASSWORD: url_shortener
          MYSQL_DATABASE: url_shortener
          MYSQL_ROOT_PASSWORD: url_shortener_root
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u url_shortener -purl_shortener --silent" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: url_shortener:url_shortener@tcp(localhost:3306)/url_shortener?parseTime=true
      BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go vet ./...
      - run: go test ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"
      - name: Audit dependencies (govulncheck)
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Audit workflow files (zizmor)
        run: uvx zizmor==1.25.2 .github/workflows/
