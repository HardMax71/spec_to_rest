services:

  migrations:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env

    volumes:
      - db_data:/data


  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ENABLE_TEST_ADMIN: ${ENABLE_TEST_ADMIN:-}

    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes:
      - db_data:/data


volumes:
  db_data:
