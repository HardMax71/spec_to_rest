services:
  migrations:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    volumes:
      - db_data:/data

  app:
    build: .
    env_file: .env
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    depends_on:
      migrations:
        condition: service_completed_successfully

volumes:
  db_data:
