[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "url-shortener"
version = "0.1.0"
description = "Generated from UrlShortener.spec"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "sqlalchemy>=2.0",
    "aiomysql>=0.2",
    "alembic>=1.14",
    "pydantic-settings>=2.0",
    "structlog>=24,<26",
    "prometheus-client>=0.21",
    "opentelemetry-sdk>=1.43",
    "opentelemetry-exporter-otlp-proto-http>=1.43",
    "opentelemetry-instrumentation-fastapi>=0.64b0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "ruff>=0.8",
    "mypy>=1.13",
    "schemathesis>=4.16,<5",
    "mutmut>=3.3,<4",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
extend-ignore = ["B008"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
