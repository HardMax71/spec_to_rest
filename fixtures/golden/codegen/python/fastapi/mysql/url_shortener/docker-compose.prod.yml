# production overlay — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Every secret below must be exported (or in .env) before `up`; Compose fails fast
# on missing values via the ${KEY:?…} substitution.
services:
  app:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  migrations:
    restart: "no"

  db:
    environment:
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required for production}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required for production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required for production}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required for production}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
