name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest


    services:
      database:
        image: mysql:8.4
        env:

          MYSQL_USER: url_shortener

          MYSQL_PASSWORD: url_shortener

          MYSQL_DATABASE: url_shortener

          MYSQL_ROOT_PASSWORD: url_shortener_root

        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u url_shortener -purl_shortener --silent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10


    env:
      DATABASE_URL: mysql+aiomysql://url_shortener:url_shortener@127.0.0.1:3306/url_shortener
      BASE_URL: http://localhost:8000
      SPEC_TEST_BASE_URL: http://localhost:8000
      SPEC_TEST_PROFILE: ${{ github.event_name == 'schedule' && 'exhaustive' || 'thorough' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check app/
      - name: Type check
        run: uv run mypy app/
      - name: Run migrations
        run: uv run alembic upgrade head
      - name: Run unit tests
        run: uv run pytest -v tests/test_health.py
      - name: Start app for conformance tests
        env:
          ENABLE_TEST_ADMIN: "1"
        run: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
      - name: Wait for /health
        run: timeout 30 bash -c 'until curl -fsS http://localhost:8000/health; do sleep 1; done'
      - name: Conformance suite (structural / behavioral / stateful)
        run: make test-conformance PROFILE=$SPEC_TEST_PROFILE
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results-${{ env.SPEC_TEST_PROFILE }}
          path: results/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Seed .env from example
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Smoke /health
        run: timeout 60 bash -c 'until curl -fsS http://localhost:8000/health; do sleep 2; done'
      - if: always()
        name: Tear down
        run: docker compose down -v
