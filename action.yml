name: Setup spec-to-rest
description: Install the spec-to-rest native binary and add it to $PATH for subsequent steps.
author: HardMax71
branding:
  icon: check-circle
  color: green

inputs:
  version:
    description: Release tag to install (e.g. v2.0.0). Use "latest" for the most recent published release.
    required: false
    default: latest
  repository:
    description: Source repository to fetch the release from. Override only when forking.
    required: false
    default: HardMax71/spec_to_rest
  github-token:
    description: |
      Token used for the GitHub API call that resolves "latest". Leave empty to fall back
      to the workflow's `github.token`. Action metadata defaults are not expression-
      evaluated, so we cannot write `${{ github.token }}` here — the fallback happens
      inside the step.
    required: false
    default: ""

outputs:
  version:
    description: The concrete release tag that was installed.
    value: ${{ steps.resolve.outputs.version }}
  binary-path:
    description: Absolute path to the installed binary.
    value: ${{ steps.install.outputs.binary-path }}

runs:
  using: composite
  steps:
    - id: detect
      name: Detect runner platform
      shell: bash
      run: |
        set -euo pipefail
        os="${RUNNER_OS}"
        arch="${RUNNER_ARCH}"
        case "$os/$arch" in
          Linux/X64)    plat=linux-amd64;   ext=tar.gz; binary=spec-to-rest ;;
          macOS/ARM64)  plat=macos-arm64;   ext=tar.gz; binary=spec-to-rest ;;
          macOS/X64)    plat=macos-amd64;   ext=tar.gz; binary=spec-to-rest ;;
          Windows/X64)  plat=windows-amd64; ext=zip;    binary=spec-to-rest.exe ;;
          *)
            echo "::error::unsupported runner platform: $os/$arch (need Linux/X64, macOS/ARM64, macOS/X64, or Windows/X64)"
            exit 1
            ;;
        esac
        {
          echo "platform=$plat"
          echo "ext=$ext"
          echo "binary=$binary"
          echo "archive=spec-to-rest-${plat}.${ext}"
        } >> "$GITHUB_OUTPUT"

    - id: resolve
      name: Resolve release tag
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        REPO: ${{ inputs.repository }}
        REQUESTED: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if ! command -v gh >/dev/null 2>&1; then
          echo "::error::the GitHub CLI ('gh') is required but not installed on this runner"
          exit 1
        fi
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::error::no GitHub token available. Pass 'github-token' or grant the workflow access to github.token."
          exit 1
        fi
        if [ "$REQUESTED" = "latest" ]; then
          tag=$(gh api "repos/$REPO/releases/latest" --jq .tag_name)
        else
          tag="$REQUESTED"
          # Fail fast if the tag does not exist.
          gh api "repos/$REPO/releases/tags/$tag" --jq .tag_name >/dev/null
        fi
        echo "version=$tag" >> "$GITHUB_OUTPUT"

    # zizmor: ignore[dangerous-use-of-environment-file]
    # GITHUB_PATH and GITHUB_OUTPUT writes below are restricted to values
    # that are either GitHub-controlled (RUNNER_TEMP) or constrained by the
    # detect step's fixed case statement (BINARY ∈ {spec-to-rest,
    # spec-to-rest.exe}). The script also validates against newlines before
    # writing GITHUB_PATH and uses the heredoc delimiter for GITHUB_OUTPUT.
    - id: install
      name: Download and install
      shell: bash
      env:
        REPO: ${{ inputs.repository }}
        TAG: ${{ steps.resolve.outputs.version }}
        ARCHIVE: ${{ steps.detect.outputs.archive }}
        BINARY: ${{ steps.detect.outputs.binary }}
        EXT: ${{ steps.detect.outputs.ext }}
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/spec-to-rest"
        mkdir -p "$install_dir"
        url="https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}"
        echo "Fetching $url"
        archive_path="${RUNNER_TEMP}/${ARCHIVE}"
        curl -fL --retry 3 -o "$archive_path" "$url"
        case "$EXT" in
          tar.gz) tar -xzf "$archive_path" -C "$install_dir" ;;
          zip)    unzip -q "$archive_path" -d "$install_dir" ;;
        esac
        binary_path="${install_dir}/${BINARY}"
        if [ ! -f "$binary_path" ]; then
          echo "::error::binary not found after extraction: $binary_path"
          ls -la "$install_dir"
          exit 1
        fi
        if [ "$EXT" = "tar.gz" ]; then chmod +x "$binary_path"; fi
        # Defensive: GITHUB_PATH is line-delimited, so reject any stray newline
        # in the path before writing (RUNNER_TEMP is GitHub-controlled, but
        # this satisfies zizmor's "dangerous use of environment file" rule
        # without an ignore directive).
        case "$install_dir" in
          *$'\n'*) echo "::error::install path contains newline" >&2; exit 1 ;;
        esac
        printf '%s\n' "$install_dir" >> "$GITHUB_PATH"
        # Use a heredoc delimiter so a stray newline in the value cannot
        # inject extra entries into GITHUB_OUTPUT.
        delim="EOF_$(uuidgen 2>/dev/null || echo "$RANDOM$RANDOM$RANDOM")"
        {
          echo "binary-path<<${delim}"
          echo "$binary_path"
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - name: Verify
      shell: bash
      env:
        BINARY: ${{ steps.detect.outputs.binary }}
        VERSION: ${{ steps.resolve.outputs.version }}
        PLATFORM: ${{ steps.detect.outputs.platform }}
      run: |
        set -euo pipefail
        # PATH was just updated, so resolve via the binary name. On Windows,
        # bash via Git-for-Windows handles the .exe suffix transparently.
        "$BINARY" --help >/dev/null
        echo "Installed spec-to-rest $VERSION on $PLATFORM"
