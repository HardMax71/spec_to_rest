          minimum: 0
        tax:
          type:
            - integer
            - 'null'
          minimum: 0
        total:
          type:
            - integer
            - 'null'
          minimum: 0
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
        shipped_at:
          type:
            - string
            - 'null'
          format: date-time
        delivered_at:
          type:
            - string
            - 'null'
          format: date-time
    PaymentCreate:
      type: object
      description: Create payload for Payment
      required:
