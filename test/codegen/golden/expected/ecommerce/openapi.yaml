        subtotal:
          type: integer
          minimum: 0
        tax:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        shipped_at:
          type:
            - string
            - 'null'
          format: date-time
        delivered_at:
          type:
            - string
            - 'null'
          format: date-time
    OrderUpdate:
      type: object
      description: Update payload for Order
      properties:
        customer_id:
          type:
            - integer
            - 'null'
          exclusiveMinimum: 0
        status:
          type:
            - string
            - 'null'
          enum:
            - DRAFT
            - PLACED
            - PAID
            - SHIPPED
            - DELIVERED
            - CANCELLED
            - RETURNED
            - null
        items:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/LineItemRead'
        subtotal:
          type:
