openapi: 3.1.0
info:
  title: EdgeCases
  version: 0.1.0
  description: API for EdgeCases. Generated from formal specification.
servers:
  - url: http://localhost:8000
    description: Local development
paths:
  /bases:
    get:
      operationId: with_constructor
      summary: WithConstructor
      tags:
        - base
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BaseRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
  /health:
    get:
      operationId: health_check
      summary: Health check
      description: Returns 200 if the service is running.
      tags:
        - infrastructure
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
components:
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response body
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error description
    BaseCreate:
      type: object
      description: Create payload for Base
      required:
        - created_at
      properties:
        created_at:
          type: string
          format: date-time
    BaseRead:
      type: object
      description: Read view for Base
      required:
        - id
        - created_at
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
    BaseUpdate:
      type: object
      description: Update payload for Base
      properties:
        created_at:
          type:
            - string
            - 'null'
          format: date-time
    ChildCreate:
      type: object
      description: Create payload for Child
      required:
        - name
        - score
      properties:
        name:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
    ChildRead:
      type: object
      description: Read view for Child
      required:
        - id
        - name
        - score
      properties:
        id:
          type: integer
        name:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
    ChildUpdate:
      type: object
      description: Update payload for Child
      properties:
        name:
          type:
            - string
            - 'null'
        score:
          type:
            - number
            - 'null'
          minimum: 0
          maximum: 100
tags:
  - name: base
    description: Base operations
  - name: child
    description: Child operations
  - name: infrastructure
    description: Health and metrics endpoints
