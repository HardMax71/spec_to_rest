services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: edge_cases
      POSTGRES_PASSWORD: edge_cases
      POSTGRES_DB: edge_cases
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edge_cases"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrations:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  db_data:
