openapi: 3.1.0
info:
  title: TodoList
  version: 0.1.0
  description: API for TodoList. Generated from formal specification.
servers:
  - url: http://localhost:8000
    description: Local development
paths:
  /todos:
    post:
      operationId: create_todo
      summary: CreateTodo
      tags:
        - todo
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreate'
    get:
      operationId: list_todos
      summary: ListTodos
      tags:
        - todo
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: status_filter
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            enum:
              - TODO
              - IN_PROGRESS
              - DONE
              - ARCHIVED
              - null
        - name: priority_filter
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            enum:
              - LOW
              - MEDIUM
              - HIGH
              - URGENT
              - null
        - name: tag_filter
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
  /todos/{id}:
    get:
      operationId: get_todo
      summary: GetTodo
      tags:
        - todo
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoRead'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
    patch:
      operationId: update_todo
      summary: UpdateTodo
      tags:
        - todo
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoRead'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoUpdate'
    delete:
      operationId: delete_todo
      summary: DeleteTodo
      tags:
        - todo
      responses:
        '204':
          description: No content
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
  /todos/{id}/start:
    post:
      operationId: start_work
      summary: StartWork
      tags:
        - todo
      responses:
        '200':
          description: Successful response
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
  /todos/{id}/complete:
    post:
      operationId: complete
      summary: Complete
      tags:
        - todo
      responses:
        '200':
          description: Successful response
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
  /todos/{id}/reopen:
    post:
      operationId: reopen
      summary: Reopen
      tags:
        - todo
      responses:
        '200':
          description: Successful response
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
  /todos/{id}/archive:
    post:
      operationId: archive
      summary: Archive
      tags:
        - todo
      responses:
        '200':
          description: Successful response
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
  /health:
    get:
      operationId: health_check
      summary: Health check
      description: Returns 200 if the service is running.
      tags:
        - infrastructure
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
components:
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response body
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error description
    TodoCreate:
      type: object
      description: Create payload for Todo
      required:
        - title
        - status
        - priority
        - created_at
        - updated_at
        - tags
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type:
            - string
            - 'null'
        status:
          type: string
          enum:
            - TODO
            - IN_PROGRESS
            - DONE
            - ARCHIVED
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - URGENT
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - 'null'
          format: date-time
        tags:
          type: array
          items:
            type: string
    TodoRead:
      type: object
      description: Read view for Todo
      required:
        - id
        - title
        - status
        - priority
        - created_at
        - updated_at
        - tags
      properties:
        id:
          type: integer
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type:
            - string
            - 'null'
        status:
          type: string
          enum:
            - TODO
            - IN_PROGRESS
            - DONE
            - ARCHIVED
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - URGENT
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - 'null'
          format: date-time
        tags:
          type: array
          items:
            type: string
    TodoUpdate:
      type: object
      description: Update payload for Todo
      properties:
        title:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 200
        description:
          type:
            - string
            - 'null'
        status:
          type:
            - string
            - 'null'
          enum:
            - TODO
            - IN_PROGRESS
            - DONE
            - ARCHIVED
            - null
        priority:
          type:
            - string
            - 'null'
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - URGENT
            - null
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
        completed_at:
          type:
            - string
            - 'null'
          format: date-time
        tags:
          type:
            - array
            - 'null'
          items:
            type: string
tags:
  - name: todo
    description: Todo operations
  - name: infrastructure
    description: Health and metrics endpoints
