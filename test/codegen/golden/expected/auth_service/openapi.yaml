openapi: 3.1.0
info:
  title: AuthService
  version: 0.1.0
  description: API for AuthService. Generated from formal specification.
servers:
  - url: http://localhost:8000
    description: Local development
paths:
  /auth/register:
    post:
      operationId: register
      summary: Register
      tags:
        - user
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
  /auth/login:
    post:
      operationId: login
      summary: Login
      tags:
        - user
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
  /users:
    post:
      operationId: login_failed
      summary: LoginFailed
      tags:
        - user
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
  /auth/refresh:
    post:
      operationId: refresh_token
      summary: RefreshToken
      tags:
        - session
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
  /auth/password-reset:
    post:
      operationId: request_password_reset
      summary: RequestPasswordReset
      tags:
        - user
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
  /auth/password-reset/confirm:
    post:
      operationId: reset_password
      summary: ResetPassword
      tags:
        - user
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
  /auth/logout:
    post:
      operationId: logout
      summary: Logout
      tags:
        - user
      responses:
        '204':
          description: No content
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
  /health:
    get:
      operationId: health_check
      summary: Health check
      description: Returns 200 if the service is running.
      tags:
        - infrastructure
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
components:
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response body
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error description
    UserCreate:
      type: object
      description: Create payload for User
      required:
        - email
        - password_hash
        - display_name
        - created_at
        - is_active
      properties:
        email:
          type: string
          pattern: ^[^@]+@[^@]+\.[^@]+$
        password_hash:
          type: string
          minLength: 64
          maxLength: 64
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        created_at:
          type: string
          format: date-time
        last_login:
          type:
            - string
            - 'null'
          format: date-time
        is_active:
          type: boolean
    UserRead:
      type: object
      description: Read view for User
      required:
        - id
        - email
        - password_hash
        - display_name
        - created_at
        - is_active
      properties:
        id:
          type: integer
        email:
          type: string
          pattern: ^[^@]+@[^@]+\.[^@]+$
        password_hash:
          type: string
          minLength: 64
          maxLength: 64
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        created_at:
          type: string
          format: date-time
        last_login:
          type:
            - string
            - 'null'
          format: date-time
        is_active:
          type: boolean
    UserUpdate:
      type: object
      description: Update payload for User
      properties:
        email:
          type:
            - string
            - 'null'
          pattern: ^[^@]+@[^@]+\.[^@]+$
        password_hash:
          type:
            - string
            - 'null'
          minLength: 64
          maxLength: 64
        display_name:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 100
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        last_login:
          type:
            - string
            - 'null'
          format: date-time
        is_active:
          type:
            - boolean
            - 'null'
    SessionCreate:
      type: object
      description: Create payload for Session
      required:
        - user_id
        - access_token
        - refresh_token
        - access_expires_at
        - refresh_expires_at
        - created_at
        - is_revoked
      properties:
        user_id:
          type: integer
          exclusiveMinimum: 0
        access_token:
          type: string
          minLength: 128
          maxLength: 128
        refresh_token:
          type: string
          minLength: 128
          maxLength: 128
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        is_revoked:
          type: boolean
    SessionRead:
      type: object
      description: Read view for Session
      required:
        - id
        - user_id
        - access_token
        - refresh_token
        - access_expires_at
        - refresh_expires_at
        - created_at
        - is_revoked
      properties:
        id:
          type: integer
        user_id:
          type: integer
          exclusiveMinimum: 0
        access_token:
          type: string
          minLength: 128
          maxLength: 128
        refresh_token:
          type: string
          minLength: 128
          maxLength: 128
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        is_revoked:
          type: boolean
    SessionUpdate:
      type: object
      description: Update payload for Session
      properties:
        user_id:
          type:
            - integer
            - 'null'
          exclusiveMinimum: 0
        access_token:
          type:
            - string
            - 'null'
          minLength: 128
          maxLength: 128
        refresh_token:
          type:
            - string
            - 'null'
          minLength: 128
          maxLength: 128
        access_expires_at:
          type:
            - string
            - 'null'
          format: date-time
        refresh_expires_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        is_revoked:
          type:
            - boolean
            - 'null'
    LoginAttemptCreate:
      type: object
      description: Create payload for LoginAttempt
      required:
        - email
        - timestamp
        - success
      properties:
        email:
          type: string
          pattern: ^[^@]+@[^@]+\.[^@]+$
        timestamp:
          type: string
          format: date-time
        success:
          type: boolean
    LoginAttemptRead:
      type: object
      description: Read view for LoginAttempt
      required:
        - id
        - email
        - timestamp
        - success
      properties:
        id:
          type: integer
        email:
          type: string
          pattern: ^[^@]+@[^@]+\.[^@]+$
        timestamp:
          type: string
          format: date-time
        success:
          type: boolean
    LoginAttemptUpdate:
      type: object
      description: Update payload for LoginAttempt
      properties:
        email:
          type:
            - string
            - 'null'
          pattern: ^[^@]+@[^@]+\.[^@]+$
        timestamp:
          type:
            - string
            - 'null'
          format: date-time
        success:
          type:
            - boolean
            - 'null'
tags:
  - name: user
    description: User operations
  - name: session
    description: Session operations
  - name: login_attempt
    description: LoginAttempt operations
  - name: infrastructure
    description: Health and metrics endpoints
