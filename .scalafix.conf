rules = [
  OrganizeImports
  RedundantSyntax
  LeakingImplicitClassVal
  DisableSyntax
  TypelevelUnusedIO
  TypelevelUnusedShowInterpolator
  TypelevelMapSequence
  TypelevelAs
]

OrganizeImports {
  targetDialect = Scala3
  removeUnused = true
}

DisableSyntax {
  noFinalize = true
  noValPatterns = true
  regex = [
    {
      id = no-unsafe-run-sync
      pattern = "\\.unsafeRunSync\\("
      message = "Do not call .unsafeRunSync in main code; return IO and let cats.effect.IOApp run it."
    }
    {
      id = no-await-result
      pattern = "Await\\.result\\("
      message = "Do not block on Future via Await.result; use IO.fromFuture or restructure as IO."
    }
    {
      id = no-sys-exit
      pattern = "sys\\.exit\\("
      message = "Use cats.effect.ExitCode and IOApp instead of sys.exit."
    }
    {
      id = no-system-exit
      pattern = "System\\.exit\\("
      message = "Use cats.effect.ExitCode and IOApp instead of System.exit."
    }
  ]
}
