name: Links

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/content/**"
      - "docs/scripts/check-links.mjs"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/content/**"
      - "docs/scripts/check-links.mjs"

permissions:
  contents: read

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The runner's pre-installed Node runs the pure-stdlib checker; no deps, no
      # build, so setup-node is unnecessary (and avoids zizmor's cache rule).
      - name: Check internal doc links
        run: node docs/scripts/check-links.mjs
