name: Python target build

on:
  pull_request:
    paths:
      - ".github/workflows/python-build.yml"
      - "build.sbt"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/profile/src/main/scala/specrest/profile/Registry.scala"
      - "modules/profile/src/main/scala/specrest/profile/TypeMap.scala"
      - "modules/profile/src/main/scala/specrest/profile/Annotate.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/python/**"
      - "modules/codegen/src/main/scala/specrest/codegen/Emit.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/Compose.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ComposeYaml.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/EnvExample.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/codegen/src/main/scala/specrest/codegen/alembic/**"
      - "modules/codegen/src/main/resources/templates/python/fastapi/**"
      - "modules/testgen/src/main/**"
      - "fixtures/spec/url_shortener.spec"
      - "fixtures/spec/todo_list.spec"
      - "fixtures/spec/ecommerce.spec"
      - "fixtures/spec/auth_service.spec"
  push:
    branches: [main]
    paths:
      - ".github/workflows/python-build.yml"
      - "modules/codegen/src/main/resources/templates/python/fastapi/**"
      - "modules/codegen/src/main/scala/specrest/codegen/python/**"
      - "modules/codegen/src/main/scala/specrest/codegen/Compose.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ComposeYaml.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/EnvExample.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/codegen/src/main/scala/specrest/codegen/alembic/**"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/testgen/src/main/**"

permissions:
  contents: read

concurrency:
  group: python-build-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  migrate:
    name: fastapi -> alembic + conformance suite (${{ matrix.fixture }} / ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: url_shortener
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: url_shortener
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: url_shortener
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: todo_list
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: todo_list
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: todo_list
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
          - fixture: ecommerce
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: ecommerce
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: ecommerce
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
          - fixture: auth_service
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: auth_service
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: auth_service
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DATABASE: app
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u app -papp --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Dafny (synthesis emit runs dafny translate)
        if: matrix.synthesis != ''
        uses: dafny-lang/setup-dafny-action@be023fc606339d46ed6b077dcb8614d0279ded31 # v1.9.1
        with:
          dafny-version: "4.11.0"

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Emit FastAPI project (${{ matrix.fixture }} / ${{ matrix.dialect }})
        run: |
          mkdir -p out
          sbt -batch "cli/run compile fixtures/spec/${{ matrix.fixture }}.spec --framework fastapi --db ${{ matrix.dialect }} --out out --ignore-verify ${{ matrix.synthesis }}"

      - name: Validate compose overlays parse (prod + staging)
        working-directory: out
        run: |
          # Uncomment "# KEY=" lines from .env.example to fill the overlay's ${KEY:?…} substitutions.
          sed -E 's/^# ([A-Z_]+)=$/\1=ci/' .env.example > .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config -q

      - name: uv sync (with test extras)
        working-directory: out
        run: uv sync --all-extras

      - name: Allow non-SUPER trigger creation (MySQL binlog)
        if: matrix.dialect == 'mysql'
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Alembic up / down / up (round-trip vs real ${{ matrix.dialect }})
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Mint per-run admin token
        run: echo "ADMIN_TOKEN=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Boot fastapi server
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
        run: |
          nohup uv run uvicorn app.main:app --port 8080 > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to become healthy" >&2
          cat server.log >&2
          exit 1

      - name: Run native conformance suite (smoke profile)
        working-directory: out
        env:
          SPEC_TEST_BASE_URL: http://localhost:8080
          SPEC_TEST_PROFILE: smoke
        run: uv run pytest tests/ -q

      - name: Server log (on failure)
        if: failure()
        working-directory: out
        run: |
          echo "::group::server.log"
          cat server.log || true
          echo "::endgroup::"

      - name: Stop server
        if: always()
        working-directory: out
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" 2>/dev/null || true; fi
