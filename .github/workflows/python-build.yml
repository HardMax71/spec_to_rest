name: Python target build

on:
  pull_request:
    paths:
      - ".github/workflows/python-build.yml"
      - "build.sbt"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/profile/src/main/scala/specrest/profile/Registry.scala"
      - "modules/profile/src/main/scala/specrest/profile/TypeMap.scala"
      - "modules/profile/src/main/scala/specrest/profile/Annotate.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/python/**"
      - "modules/codegen/src/main/scala/specrest/codegen/Emit.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/Compose.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ComposeYaml.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/EnvExample.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/codegen/src/main/scala/specrest/codegen/alembic/**"
      - "modules/codegen/src/main/resources/templates/python/fastapi/**"
      - "modules/testgen/src/main/**"
      - "fixtures/spec/url_shortener.spec"
      - "fixtures/spec/todo_list.spec"
      - "fixtures/spec/ecommerce.spec"
      - "fixtures/spec/auth_service.spec"
  push:
    branches: [main]
    paths:
      - ".github/workflows/python-build.yml"
      - "modules/codegen/src/main/resources/templates/python/fastapi/**"
      - "modules/codegen/src/main/scala/specrest/codegen/python/**"
      - "modules/codegen/src/main/scala/specrest/codegen/Compose.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ComposeYaml.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/EnvExample.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/codegen/src/main/scala/specrest/codegen/alembic/**"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/testgen/src/main/**"

permissions:
  contents: read

concurrency:
  group: python-build-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  migrate:
    name: fastapi -> alembic + conformance suite (${{ matrix.fixture }} / ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: url_shortener
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: url_shortener
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: url_shortener
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
          - fixture: todo_list
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: todo_list
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: todo_list
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
          - fixture: ecommerce
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: ecommerce
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: ecommerce
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
          - fixture: auth_service
            dialect: postgres
            db_url: postgresql+asyncpg://app:app@localhost:5432/app
          - fixture: auth_service
            dialect: sqlite
            db_url: sqlite+aiosqlite:///./test.db
          - fixture: auth_service
            dialect: mysql
            db_url: mysql+aiomysql://app:app@127.0.0.1:3306/app
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DATABASE: app
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u app -papp --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Emit FastAPI project (${{ matrix.fixture }} / ${{ matrix.dialect }})
        run: |
          mkdir -p out
          sbt -batch "cli/run compile fixtures/spec/${{ matrix.fixture }}.spec --framework fastapi --db ${{ matrix.dialect }} --out out --ignore-verify"

      - name: Validate compose overlays parse (prod + staging)
        working-directory: out
        run: |
          # Uncomment "# KEY=" lines from .env.example to fill the overlay's ${KEY:?…} substitutions.
          sed -E 's/^# ([A-Z_]+)=$/\1=ci/' .env.example > .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config -q

      - name: uv sync (with test extras)
        working-directory: out
        run: uv sync --all-extras

      - name: Allow non-SUPER trigger creation (MySQL binlog)
        if: matrix.dialect == 'mysql'
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Alembic up / down / up (round-trip vs real ${{ matrix.dialect }})
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
