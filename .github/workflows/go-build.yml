name: Go target build

on:
  pull_request:
    paths:
      - ".github/workflows/go-build.yml"
      - "build.sbt"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/profile/src/main/scala/specrest/profile/Registry.scala"
      - "modules/profile/src/main/scala/specrest/profile/TypeMap.scala"
      - "modules/profile/src/main/scala/specrest/profile/Annotate.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/go/**"
      - "modules/codegen/src/main/scala/specrest/codegen/GoTemplates.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/Emit.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/Compose.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ComposeYaml.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/EnvExample.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/codegen/src/main/resources/templates/go/chi/**"
      - "modules/testgen/src/main/**"
      - "fixtures/spec/url_shortener.spec"
      - "fixtures/spec/todo_list.spec"
      - "fixtures/spec/ecommerce.spec"
      - "fixtures/spec/auth_service.spec"
  push:
    branches: [main]
    paths:
      - ".github/workflows/go-build.yml"
      - "modules/codegen/src/main/resources/templates/go/chi/**"
      - "modules/codegen/src/main/scala/specrest/codegen/go/**"
      - "modules/codegen/src/main/scala/specrest/codegen/Compose.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ComposeYaml.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/EnvExample.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/testgen/src/main/**"

permissions:
  contents: read

concurrency:
  group: go-build-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: go-chi -> go build + migrate (${{ matrix.fixture }} / ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: url_shortener
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
          - fixture: url_shortener
            dialect: sqlite
            migrate_url: sqlite://app.db
          - fixture: url_shortener
            dialect: mysql
            migrate_url: mysql://app:app@tcp(127.0.0.1:3306)/app
          - fixture: todo_list
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
          - fixture: todo_list
            dialect: sqlite
            migrate_url: sqlite://app.db
          - fixture: todo_list
            dialect: mysql
            migrate_url: mysql://app:app@tcp(127.0.0.1:3306)/app
          - fixture: ecommerce
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
          - fixture: ecommerce
            dialect: sqlite
            migrate_url: sqlite://app.db
          - fixture: ecommerce
            dialect: mysql
            migrate_url: mysql://app:app@tcp(127.0.0.1:3306)/app
          - fixture: auth_service
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
          - fixture: auth_service
            dialect: sqlite
            migrate_url: sqlite://app.db
          - fixture: auth_service
            dialect: mysql
            migrate_url: mysql://app:app@tcp(127.0.0.1:3306)/app
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DATABASE: app
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u app -papp --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"

      - name: Emit Go project (${{ matrix.fixture }} / ${{ matrix.dialect }})
        run: |
          mkdir -p out
          sbt -batch "cli/run compile fixtures/spec/${{ matrix.fixture }}.spec --framework chi --db ${{ matrix.dialect }} --out out --ignore-verify"

      - name: Inspect emitted layout
        run: |
          find out -type f | sort
          echo "--- go.mod ---"
          cat out/go.mod

      - name: Validate compose overlays parse (prod + staging)
        working-directory: out
        run: |
          # Uncomment "# KEY=" lines from .env.example to fill the overlay's ${KEY:?…} substitutions.
          sed -E 's/^# ([A-Z_]+)=$/\1=ci/' .env.example > .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config -q

      - name: go mod tidy
        working-directory: out
        run: go mod tidy

      - name: gofmt (normalize, do not gate)
        working-directory: out
        run: gofmt -w .

      - name: go vet
        working-directory: out
        run: go vet ./...

      - name: go build
        working-directory: out
        run: go build ./...

      - name: Install golang-migrate CLI
        run: go install -tags 'postgres mysql sqlite' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1

      - name: Allow non-SUPER trigger creation (MySQL binlog)
        if: matrix.dialect == 'mysql'
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Migrate up / down / up (round-trip vs real ${{ matrix.dialect }})
        working-directory: out
        env:
          DB_URL: ${{ matrix.migrate_url }}
        run: |
          migrate -path migrations -database "$DB_URL" up
          migrate -path migrations -database "$DB_URL" down -all
          migrate -path migrations -database "$DB_URL" up

  conformance:
    name: go-chi -> conformance suite (${{ matrix.fixture }} / ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: url_shortener
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
            db_url: postgres://app:app@localhost:5432/app?sslmode=disable
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: url_shortener
            dialect: sqlite
            migrate_url: sqlite://app.db
            db_url: file:app.db?cache=shared&_pragma=foreign_keys(1)
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: todo_list
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
            db_url: postgres://app:app@localhost:5432/app?sslmode=disable
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: todo_list
            dialect: sqlite
            migrate_url: sqlite://app.db
            db_url: file:app.db?cache=shared&_pragma=foreign_keys(1)
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: ecommerce
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
            db_url: postgres://app:app@localhost:5432/app?sslmode=disable
            synthesis: "--with-synthesis --synthesis-model claude-fable-5"
          - fixture: ecommerce
            dialect: sqlite
            migrate_url: sqlite://app.db
            db_url: file:app.db?cache=shared&_pragma=foreign_keys(1)
            synthesis: "--with-synthesis --synthesis-model claude-fable-5"
          - fixture: auth_service
            dialect: postgres
            migrate_url: postgres://app:app@localhost:5432/app?sslmode=disable
            db_url: postgres://app:app@localhost:5432/app?sslmode=disable
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
          - fixture: auth_service
            dialect: sqlite
            migrate_url: sqlite://app.db
            db_url: file:app.db?cache=shared&_pragma=foreign_keys(1)
            synthesis: "--with-synthesis --synthesis-model gpt-5-mini-2025-08-07"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Dafny (synthesis emit runs dafny translate)
        if: matrix.synthesis != ''
        uses: dafny-lang/setup-dafny-action@be023fc606339d46ed6b077dcb8614d0279ded31 # v1.9.1
        with:
          dafny-version: "4.11.0"

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"

      - name: Emit Go project (${{ matrix.fixture }} / ${{ matrix.dialect }})
        run: |
          mkdir -p out
          sbt -batch "cli/run compile fixtures/spec/${{ matrix.fixture }}.spec --framework chi --db ${{ matrix.dialect }} --out out --ignore-verify ${{ matrix.synthesis }}"

      - name: go mod tidy + add rapid
        working-directory: out
        run: |
          go mod tidy
          go get pgregory.net/rapid@v1.3.0
          go mod tidy

      - name: go vet -tags conformance (dafny-translated runtime excluded)
        working-directory: out
        run: go list ./... | grep -v dafnykernel | xargs go vet -tags conformance

      - name: build server
        working-directory: out
        run: go build -o server ./cmd/server

      - name: Install golang-migrate CLI
        run: go install -tags 'postgres sqlite' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1

      - name: Migrate up (${{ matrix.dialect }})
        working-directory: out
        env:
          DB_URL: ${{ matrix.migrate_url }}
        run: migrate -path migrations -database "$DB_URL" up

      - name: Mint per-run admin token
        run: echo "ADMIN_TOKEN=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Boot go-chi server
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
          PORT: "8080"
        run: |
          nohup ./server > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to become healthy" >&2
          cat server.log >&2
          exit 1

      - name: Run native conformance suite (smoke profile)
        working-directory: out
        env:
          SPEC_TEST_BASE_URL: http://localhost:8080
          SPEC_TEST_PROFILE: smoke
        run: go test -tags conformance -count=1 ./tests/...

      - name: Server log (on failure)
        if: failure()
        working-directory: out
        run: |
          echo "::group::server.log"
          cat server.log || true
          echo "::endgroup::"

      - name: Stop server
        if: always()
        working-directory: out
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" 2>/dev/null || true; fi
