name: Native Image

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/native.yml"
      - "build.sbt"
      - "project/plugins.sbt"
      - "modules/cli/src/main/resources/META-INF/native-image/**"
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "Tag to build + attach assets to (e.g. v2.1.0)"
        type: string
        required: true
      upload_to_existing_release:
        description: "If true, upload assets to an existing release instead of creating one."
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: native-image-${{ inputs.tag || github.ref }}
  cancel-in-progress: ${{ !(startsWith(github.ref, 'refs/tags/v') || inputs.tag != '') }}

jobs:
  native-image:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            binary: spec-to-rest
            archive: spec-to-rest-linux-amd64.tar.gz
          - os: macos-latest
            platform: macos-arm64
            binary: spec-to-rest
            archive: spec-to-rest-macos-arm64.tar.gz
          - os: macos-26-intel
            platform: macos-amd64
            binary: spec-to-rest
            archive: spec-to-rest-macos-amd64.tar.gz
          - os: windows-latest
            platform: windows-amd64
            binary: spec-to-rest.exe
            archive: spec-to-rest-windows-amd64.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.6
        with:
          # Pinned to 21, not 23: graalvm-community 23.x has a known
          # native-image build-time regression (~2x slower image-gen, higher
          # peak RSS) — see oracle/graal + quarkusio/quarkus#38683, and our own
          # macos-arm64 data (15m45s on 21.0.2 vs 37m15s on 23.0.2). The #222
          # fix is GraalVM-version-independent. Revisit when 24.x LTS lands.
          java-version: "21"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0

      - name: Build native image
        shell: bash
        run: sbt cli/nativeImage

      - name: Smoke-test native binary
        shell: bash
        env:
          BIN: modules/cli/target/native-image/${{ matrix.binary }}
        run: |
          set -euo pipefail
          smoke_dir="${RUNNER_TEMP}/native-smoke"
          rm -rf "$smoke_dir"
          "$BIN" check fixtures/spec/url_shortener.spec
          "$BIN" verify fixtures/spec/safe_counter.spec
          "$BIN" compile \
            --framework fastapi --db postgres --out "$smoke_dir" \
            --ignore-verify \
            fixtures/spec/url_shortener.spec
          test -f "$smoke_dir/pyproject.toml"
          test -f "$smoke_dir/app/main.py"

      - name: Package release archive
        shell: bash
        env:
          BIN: modules/cli/target/native-image/${{ matrix.binary }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p dist
          dir=$(dirname "$BIN")
          file=$(basename "$BIN")
          case "$ARCHIVE" in
            *.tar.gz)
              chmod +x "$BIN"
              tar -czf "dist/$ARCHIVE" -C "$dir" "$file"
              ;;
            *.zip)
              # 7-Zip is preinstalled on GitHub Windows runners.
              ( cd "$dir" && 7z a -tzip "$GITHUB_WORKSPACE/dist/$ARCHIVE" "$file" >/dev/null )
              ;;
            *)
              echo "::error::Unknown archive extension for '$ARCHIVE'"
              exit 1
              ;;
          esac
          ls -la dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: native-image
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List staged artifacts
        run: ls -la dist/

      - name: Publish or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
          UPLOAD_TO_EXISTING: ${{ inputs.upload_to_existing_release }}
        run: |
          set -euo pipefail
          if [[ "$UPLOAD_TO_EXISTING" == "true" ]]; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/*
          fi
