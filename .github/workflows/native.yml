name: Native Image

on:
  push:
    tags: ["v*"]
  pull_request:
    paths: [".github/workflows/native.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-image-${{ github.event_name }}-${{ github.sha }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  native-image:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            binary: spec-to-rest
            archive: spec-to-rest-linux-amd64.tar.gz
          - os: macos-latest
            platform: macos-arm64
            binary: spec-to-rest
            archive: spec-to-rest-macos-arm64.tar.gz
          - os: macos-26-intel
            platform: macos-amd64
            binary: spec-to-rest
            archive: spec-to-rest-macos-amd64.tar.gz
          - os: windows-latest
            platform: windows-amd64
            binary: spec-to-rest.exe
            archive: spec-to-rest-windows-amd64.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1.5.3
        with:
          java-version: "23"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0

      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22

      - name: Build native image
        shell: bash
        run: sbt cli/nativeImage

      - name: Smoke-test native binary
        shell: bash
        env:
          BIN: modules/cli/target/native-image/${{ matrix.binary }}
        run: |
          set -euo pipefail
          smoke_dir="${RUNNER_TEMP}/native-smoke"
          rm -rf "$smoke_dir"
          "$BIN" check fixtures/spec/url_shortener.spec
          "$BIN" verify fixtures/spec/safe_counter.spec
          "$BIN" compile \
            --target python-fastapi-postgres --out "$smoke_dir" \
            --ignore-verify \
            fixtures/spec/url_shortener.spec
          test -f "$smoke_dir/pyproject.toml"
          test -f "$smoke_dir/app/main.py"

      - name: Package release archive
        shell: bash
        env:
          BIN: modules/cli/target/native-image/${{ matrix.binary }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p dist
          dir=$(dirname "$BIN")
          file=$(basename "$BIN")
          case "$ARCHIVE" in
            *.tar.gz)
              chmod +x "$BIN"
              tar -czf "dist/$ARCHIVE" -C "$dir" "$file"
              ;;
            *.zip)
              # 7-Zip is preinstalled on GitHub Windows runners.
              ( cd "$dir" && 7z a -tzip "$GITHUB_WORKSPACE/dist/$ARCHIVE" "$file" >/dev/null )
              ;;
            *)
              echo "::error::Unknown archive extension for '$ARCHIVE'"
              exit 1
              ;;
          esac
          ls -la dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: native-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List staged artifacts
        run: ls -la dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
