name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**"]
  pull_request:
    paths-ignore: ["docs/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate parser from grammar
        run: npm run generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Check formatting
        run: npm run fmt:check

  z3-cross-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install native Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Record native Z3 version
        run: z3 --version

      - name: Cross-check url_shortener SMT snapshot against native Z3
        run: |
          timeout 60s z3 -T:30 test/verify/fixtures/url_shortener.smt2 \
            | head -n1 | grep -Fxq sat
