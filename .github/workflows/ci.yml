name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    uses: ./.github/workflows/changes.yml

  build-and-test:
    needs: changes
    # skip only when detection is certain the change set is docs-only; fail open to testing
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0

      # SolverCrossCheckTest re-solves the compiler's freshly-dumped VCs with
      # native z3 and cvc5 (and Alloy) and fails on any disagreement. It skips
      # when the solvers are absent, so these installs are what make it run.
      - name: Install native solvers (z3, cvc5)
        run: sudo apt-get update && sudo apt-get install -y z3 cvc5

      - name: Record solver versions
        run: z3 --version && cvc5 --version

      - name: Cache Alloy 6.2.0 CLI jar
        id: alloy-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/alloy/alloy.jar
          key: alloy-6.2.0

      - name: Download Alloy 6.2.0 CLI jar
        if: steps.alloy-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/alloy
          curl -fsSL -o ~/.cache/alloy/alloy.jar \
            https://github.com/AlloyTools/org.alloytools.alloy/releases/download/v6.2.0/org.alloytools.alloy.dist.jar

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Compile all modules
        run: sbt "all compile Test/compile"

      - name: Check lint rules
        run: sbt "scalafixAll --check"

      - name: Run all tests
        run: sbt test
