name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**"]
  pull_request:
    paths-ignore: ["docs/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate parser from grammar
        run: npm run generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Check formatting
        run: npm run fmt:check
