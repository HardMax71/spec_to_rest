name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**"]
  pull_request:
    paths-ignore: ["docs/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa4c79bbd9a5e817b30 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@4e2615869d13561d626ed48655e1a39e5b192b3c # v6

      - uses: sbt/setup-sbt@8afbcb9f2f0a6dfcb6c3f03dc78a0f4e89e579f5 # v1

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Compile all modules
        run: sbt "all compile Test/compile"

      - name: Run all tests
        run: sbt test

  z3-cross-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install native Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Record native Z3 version
        run: z3 --version

      - name: Cross-check url_shortener SMT snapshot against native Z3
        run: |
          timeout 60s z3 -T:30 fixtures/golden/smt/url_shortener.smt2 \
            | head -n1 | grep -Fxq sat
