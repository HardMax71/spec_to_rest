name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**"]
  pull_request:
    paths-ignore: ["docs/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@4e2615869d13561d626ed48655e1a39e5b192b3c # v6.4.7

      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Compile all modules
        run: sbt "all compile Test/compile"

      - name: Check lint rules
        run: sbt "scalafixAll --check"

      - name: Run all tests
        run: sbt test

  z3-cross-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install native Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Record native Z3 version
        run: z3 --version

      - name: Cross-check url_shortener SMT snapshot against native Z3
        run: |
          timeout 60s z3 -T:30 fixtures/golden/smt/url_shortener.smt2 \
            | head -n1 | grep -Fxq sat

      - name: Cross-check set_ops SMT snapshot against native Z3
        run: |
          timeout 60s z3 -T:30 fixtures/golden/smt/set_ops.smt2 \
            | head -n1 | grep -Fxq sat

      - name: Cross-check per-check VC dumps against native Z3
        run: |
          set -e
          for verdicts in fixtures/golden/vc/*/verdicts.json; do
            dir=$(dirname "$verdicts")
            for f in "$dir"/*.smt2; do
              [ -f "$f" ] || continue
              id=$(basename "$f" .smt2)
              expected=$(jq -r --arg id "$id" '.entries[] | select(.id == $id) | .rawStatus' "$verdicts")
              case "$expected" in
                sat|unsat) ;;
                *) echo "skip $id (rawStatus=$expected)"; continue ;;
              esac
              actual=$(timeout 60s z3 -T:30 "$f" | head -n1)
              if [ "$actual" != "$expected" ]; then
                echo "DISAGREEMENT in $f: WASM=$expected, native=$actual" >&2
                exit 1
              fi
              echo "ok $id ($expected)"
            done
          done

  cvc5-cross-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install native cvc5
        run: sudo apt-get update && sudo apt-get install -y cvc5

      - name: Record native cvc5 version
        run: cvc5 --version | head -1

      - name: Cross-check per-check VC dumps against native cvc5
        run: |
          set -euo pipefail
          any_z3_entries=0
          any_checked=0
          any_skipped_unknown=0
          for verdicts in fixtures/golden/vc/*/verdicts.json; do
            dir=$(dirname "$verdicts")
            mapfile -t z3_ids < <(jq -r '.entries[] | select(.tool == "z3") | .id' "$verdicts")
            [ "${#z3_ids[@]}" -gt 0 ] || { echo "skip $dir (no z3 entries)"; continue; }
            any_z3_entries=1
            for id in "${z3_ids[@]}"; do
              file=$(jq -r --arg id "$id" '.entries[] | select(.tool == "z3" and .id == $id) | .file' "$verdicts")
              expected=$(jq -r --arg id "$id" '.entries[] | select(.tool == "z3" and .id == $id) | .rawStatus' "$verdicts")
              case "$expected" in
                sat|unsat) ;;
                *) echo "skip $id (rawStatus=$expected)"; continue ;;
              esac
              actual=$(timeout 60s cvc5 --finite-model-find --tlimit-per=30000 "$dir/$file" 2>&1 \
                | grep -E '^(sat|unsat|unknown)$' | head -1 || true)
              if [ -z "$actual" ] || [ "$actual" = "unknown" ]; then
                echo "skip $dir/$id (cvc5=${actual:-no-verdict}; z3=$expected)"
                any_skipped_unknown=1
                continue
              fi
              if [ "$actual" != "$expected" ]; then
                echo "DISAGREEMENT in $dir/$file: z3=$expected, cvc5=$actual" >&2
                exit 1
              fi
              echo "ok $dir/$id ($expected)"
              any_checked=1
            done
          done
          if [ "$any_z3_entries" -eq 0 ]; then
            echo "no z3-tool entries found under fixtures/golden/vc/ â€” refusing to pass vacuously" >&2
            exit 1
          fi
          if [ "$any_checked" -eq 0 ]; then
            echo "z3-tool entries exist but cvc5 returned unknown / non-sat-or-unsat for all â€” nothing was cross-checked" >&2
            exit 1
          fi
          if [ "$any_skipped_unknown" -ne 0 ]; then
            echo "warning: at least one entry was skipped because cvc5 returned unknown; agreement was not vacuous, but not exhaustive" >&2
          fi

      - name: Upload golden VC dumps on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cvc5-cross-check-disagreement
          path: fixtures/golden/vc/
          if-no-files-found: error

  alloy-cross-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Alloy 6.2.0 CLI jar
        id: alloy-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/alloy/alloy.jar
          key: alloy-6.2.0

      - name: Download Alloy 6.2.0 CLI jar
        if: steps.alloy-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/alloy
          curl -fsSL -o ~/.cache/alloy/alloy.jar \
            https://github.com/AlloyTools/org.alloytools.alloy/releases/download/v6.2.0/org.alloytools.alloy.dist.jar

      - name: Cross-check per-check VC dumps against native Alloy
        run: |
          set -euo pipefail
          any_alloy_entries=0
          any_checked=0
          for verdicts in fixtures/golden/vc/*/verdicts.json; do
            dir=$(dirname "$verdicts")
            mapfile -t alloy_ids < <(jq -r '.entries[] | select(.tool == "alloy") | .id' "$verdicts")
            [ "${#alloy_ids[@]}" -gt 0 ] || { echo "skip $dir (no alloy entries)"; continue; }
            any_alloy_entries=1
            for id in "${alloy_ids[@]}"; do
              file=$(jq -r --arg id "$id" '.entries[] | select(.tool == "alloy" and .id == $id) | .file' "$verdicts")
              expected=$(jq -r --arg id "$id" '.entries[] | select(.tool == "alloy" and .id == $id) | .rawStatus' "$verdicts")
              case "$expected" in
                sat|unsat) ;;
                *) echo "skip $id (rawStatus=$expected)"; continue ;;
              esac
              workdir=$(mktemp -d)
              cp "$dir/$file" "$workdir/$(basename "$file")"
              ( cd "$workdir" && timeout 60s java -jar ~/.cache/alloy/alloy.jar exec -q -f -s sat4j "$(basename "$file")" >/dev/null )
              stem="${file%.als}"
              receipt="$workdir/$stem/receipt.json"
              if [ ! -f "$receipt" ]; then
                echo "no receipt.json for $id at $receipt" >&2
                exit 1
              fi
              actual=$(jq -r '.commands | to_entries[0].value | if has("solution") then "sat" else "unsat" end' "$receipt")
              if [ "$actual" != "$expected" ]; then
                echo "DISAGREEMENT in $dir/$file: in-process=$expected, native=$actual" >&2
                exit 1
              fi
              echo "ok $dir/$id ($expected)"
              rm -rf "$workdir"
              any_checked=1
            done
          done
          if [ "$any_alloy_entries" -eq 0 ]; then
            echo "no alloy-tool entries found under fixtures/golden/vc/ â€” refusing to pass vacuously" >&2
            exit 1
          fi
          if [ "$any_checked" -eq 0 ]; then
            echo "alloy-tool entries exist but all had non-sat/unsat rawStatus â€” nothing was cross-checked" >&2
            exit 1
          fi
