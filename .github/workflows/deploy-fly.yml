name: Site

# CI + deploy for the docs site (which bundles the playground).
# On PR / push: validate (check CLI snippets aren't stale, Next.js builds).
# On push to main / release / workflow_dispatch: also deploy to Fly.
# Release events rebuild the container image with the new CLI binary baked in.

on:
  pull_request:
    paths:
      - "docs/**"
      - "fixtures/spec/**"
      - "modules/cli/**"
      - "deploy/**"
      - "fly.toml"
      - ".github/workflows/deploy-fly.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "fixtures/spec/**"
      - "modules/cli/**"
      - "deploy/**"
      - "fly.toml"
      - ".github/workflows/deploy-fly.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      cli_version:
        description: "spec-to-rest release tag to bake into the image (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23

      - name: Compile CLI runtime classpath
        run: sbt --error 'set ThisBuild / showSuccess := false' "show cli/Runtime/fullClasspathAsJars"

      # Use the runner's pre-installed Node (ubuntu-latest ships Node 20+
      # which is what Next.js 16 needs). Dropping `actions/setup-node`
      # avoids both the cache-poisoning class of zizmor findings and any
      # implicit caching the action does. Print versions so a future
      # incompatibility is obvious from the log.
      - name: Verify pre-installed Node + npm
        run: |
          node --version
          npm --version

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Verify CLI snippet outputs are not stale
        run: npm run check-cli-snippets
        working-directory: docs

      - name: Build docs site (validates Next.js standalone output)
        run: npm run build
        working-directory: docs

  deploy:
    needs: validate
    if: |
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: docs-prod
      url: https://spec-to-rest-site.fly.dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve CLI version to bake into the image
        id: ver
        # All `${{ }}` expansions go through env vars so they can't break out
        # of the shell quoting and inject arbitrary commands (zizmor / cubic /
        # coderabbit each flagged this on the previous revision).
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.cli_version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] \
            && [ -n "$INPUT_VERSION" ] \
            && [ "$INPUT_VERSION" != "latest" ]; then
            tag="$INPUT_VERSION"
          else
            tag=$(gh release view --repo "$REPO" --json tagName --jq .tagName)
          fi
          # Tag must look like a Git ref / version string — defence in depth
          # against a deploy actor smuggling a build arg through a malformed
          # release name.
          if ! printf '%s' "$tag" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "::error::resolved tag $tag has unexpected characters; aborting" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved CLI version: $tag"

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CLI_VERSION: ${{ steps.ver.outputs.tag }}
        run: |
          flyctl deploy \
            --remote-only \
            --build-arg "SPEC_TO_REST_VERSION=$CLI_VERSION" \
            --strategy rolling \
            --wait-timeout 300
