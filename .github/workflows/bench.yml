name: Bench

# Manual trigger only. The full bench runs ~3.5 minutes (5 @Param values × 40s of
# warmup+measurement) + sbt warmup, which is too slow to gate every PR — and
# GitHub-hosted runners are noisy enough that a regression gate produces false
# positives anyway. Developers run this on demand to refresh the golden CSV or
# sanity-check a perf-sensitive change; keep the golden committed from a real
# contributor machine.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jmh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Run JMH bench
        run: |
          sbt 'bench/Jmh/run -rf csv -rff /tmp/parallel_verify.csv ParallelVerifyBench'

      - name: Upload fresh CSV as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parallel_verify_csv
          path: /tmp/parallel_verify.csv
          if-no-files-found: error

      - name: Regression check against golden
        # GitHub-hosted ubuntu runners are noisy: repeat measurements of the same
        # commit routinely differ by 10-20%. The 15% threshold is per M_CE.9 (#104);
        # expect occasional false positives. On a false fail, re-run the job or
        # regenerate the golden locally and commit.
        run: scripts/bench_compare.sh /tmp/parallel_verify.csv fixtures/golden/bench/parallel_verify.csv 15
