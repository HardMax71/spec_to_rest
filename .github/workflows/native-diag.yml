name: Native Image Diagnostic

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/native-diag.yml"
      - "build.sbt"
      - "modules/cli/src/main/scala/specrest/cli/DiagInit.scala"
      - "modules/cli/src/main/scala/specrest/cli/Main.scala"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - "proofs/isabelle/SpecRest/Codegen.thy"

permissions:
  contents: read

concurrency:
  group: native-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diag:
    name: Diag (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            binary: spec-to-rest
          - os: macos-26-intel
            platform: macos-amd64
            binary: spec-to-rest
          - os: windows-latest
            platform: windows-amd64
            binary: spec-to-rest.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - uses: graalvm/setup-graalvm@329c42c5f4c343bceb505f0b28cc8499bc2bf174 # v1.5.4
        with:
          # Keep in lockstep with native.yml — pinned to 21 to avoid the
          # graalvm-community 23.x native-image build-time regression. See #222.
          java-version: "21"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1

      - name: Build native image
        shell: bash
        run: sbt -batch cli/nativeImage

      - name: Run __diag-init
        shell: bash
        env:
          BIN: modules/cli/target/native-image/${{ matrix.binary }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set +e
          mkdir -p diag-out
          test -x "$BIN" || { echo "::error::binary not found: $BIN"; ls -la modules/cli/target/native-image/ || true; exit 1; }
          "$BIN" __diag-init >"diag-out/${PLATFORM}-stdout.txt" 2>"diag-out/${PLATFORM}-stderr.txt"
          echo "$?" >"diag-out/${PLATFORM}-exit.txt"
          echo "----- STDERR (cause chain) -----"
          cat "diag-out/${PLATFORM}-stderr.txt"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: diag-${{ matrix.platform }}
          path: diag-out/
          if-no-files-found: warn

  summarize:
    name: Summarize
    needs: diag
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: false

      - name: Render per-platform stderr into run summary
        shell: bash
        run: |
          set +e
          for d in artifacts/*/; do
            plat=$(basename "$d")
            {
              echo "## $plat"
              for stderr in "$d"*-stderr.txt; do
                [ -f "$stderr" ] || continue
                echo '```text'
                head -c 50000 "$stderr"
                echo ''
                echo '```'
              done
            } >>"$GITHUB_STEP_SUMMARY"
          done
