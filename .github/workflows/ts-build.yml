name: TS target build

on:
  pull_request:
    paths:
      - ".github/workflows/ts-build.yml"
      - "build.sbt"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/profile/src/main/scala/specrest/profile/Registry.scala"
      - "modules/profile/src/main/scala/specrest/profile/TypeMap.scala"
      - "modules/profile/src/main/scala/specrest/profile/Annotate.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/ts/**"
      - "modules/codegen/src/main/scala/specrest/codegen/TsTemplates.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/Emit.scala"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/codegen/src/main/resources/templates/ts/express/**"
      - "modules/testgen/src/main/**"
      - "fixtures/spec/url_shortener.spec"
      - "fixtures/spec/todo_list.spec"
      - "fixtures/spec/ecommerce.spec"
      - "fixtures/spec/auth_service.spec"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ts-build.yml"
      - "modules/codegen/src/main/resources/templates/ts/express/**"
      - "modules/codegen/src/main/scala/specrest/codegen/ts/**"
      - "modules/codegen/src/main/scala/specrest/codegen/migration/**"
      - "modules/profile/src/main/scala/specrest/profile/Targets.scala"
      - "modules/testgen/src/main/**"

permissions:
  contents: read

concurrency:
  group: ts-build-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: ts-express -> tsc + prisma + migrate (${{ matrix.fixture }} / ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: url_shortener
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: url_shortener
            dialect: sqlite
            db_url: file:./app.db
          - fixture: url_shortener
            dialect: mysql
            db_url: mysql://app:app@127.0.0.1:3306/app
          - fixture: todo_list
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: todo_list
            dialect: sqlite
            db_url: file:./app.db
          - fixture: todo_list
            dialect: mysql
            db_url: mysql://app:app@127.0.0.1:3306/app
          - fixture: ecommerce
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: ecommerce
            dialect: sqlite
            db_url: file:./app.db
          - fixture: ecommerce
            dialect: mysql
            db_url: mysql://app:app@127.0.0.1:3306/app
          - fixture: auth_service
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: auth_service
            dialect: sqlite
            db_url: file:./app.db
          - fixture: auth_service
            dialect: mysql
            db_url: mysql://app:app@127.0.0.1:3306/app
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DATABASE: app
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u app -papp --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Emit TS project (${{ matrix.fixture }} / ${{ matrix.dialect }})
        run: |
          mkdir -p out
          sbt -batch "cli/run compile fixtures/spec/${{ matrix.fixture }}.spec --framework express --db ${{ matrix.dialect }} --no-tests --out out --ignore-verify"

      - name: Inspect emitted layout
        run: |
          find out -type f | sort
          echo "--- package.json ---"
          cat out/package.json
          echo "--- prisma/schema.prisma ---"
          cat out/prisma/schema.prisma

      - name: npm install
        working-directory: out
        run: npm install --no-audit --no-fund

      - name: prisma generate
        working-directory: out
        run: npx prisma generate

      - name: tsc --noEmit
        working-directory: out
        run: npx tsc --noEmit

      - name: vitest (no conformance suite emitted; only the scaffold health.test.ts runs)
        working-directory: out
        run: npm test

      - name: build dist
        working-directory: out
        run: npm run build

      - name: Allow non-SUPER trigger creation (MySQL binlog)
        if: matrix.dialect == 'mysql'
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Prisma migrate deploy / reset / deploy (round-trip vs real ${{ matrix.dialect }})
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
        run: |
          npx prisma migrate deploy
          npx prisma migrate reset --force --skip-seed --skip-generate
          npx prisma migrate deploy

  conformance:
    name: ts-express -> conformance suite (${{ matrix.fixture }} / ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - fixture: url_shortener
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: url_shortener
            dialect: sqlite
            db_url: file:./app.db
          - fixture: todo_list
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: todo_list
            dialect: sqlite
            db_url: file:./app.db
          - fixture: ecommerce
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: ecommerce
            dialect: sqlite
            db_url: file:./app.db
          - fixture: auth_service
            dialect: postgres
            db_url: postgresql://app:app@localhost:5432/app
          - fixture: auth_service
            dialect: sqlite
            db_url: file:./app.db
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1

      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Emit TS project (${{ matrix.fixture }} / ${{ matrix.dialect }})
        run: |
          mkdir -p out
          sbt -batch "cli/run compile fixtures/spec/${{ matrix.fixture }}.spec --framework express --db ${{ matrix.dialect }} --out out --ignore-verify"

      - name: npm install
        working-directory: out
        run: npm install --no-audit --no-fund

      - name: prisma generate
        working-directory: out
        run: npx prisma generate

      - name: tsc --noEmit
        working-directory: out
        run: npx tsc --noEmit

      - name: build dist
        working-directory: out
        run: npm run build

      - name: Prisma migrate deploy
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
        run: npx prisma migrate deploy

      - name: Boot ts-express server (ENABLE_TEST_ADMIN=1)
        working-directory: out
        env:
          DATABASE_URL: ${{ matrix.db_url }}
          ENABLE_TEST_ADMIN: "1"
          PORT: "8080"
        run: |
          nohup node dist/index.js > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to become healthy" >&2
          cat server.log >&2
          exit 1

      - name: Install conformance test deps (vitest + fast-check)
        working-directory: out
        run: npm install --no-audit --no-fund --save-dev vitest fast-check

      - name: Run native conformance suite (smoke profile)
        working-directory: out
        env:
          SPEC_TEST_BASE_URL: http://localhost:8080
          SPEC_TEST_PROFILE: smoke
        run: node tests/run_conformance.mjs smoke

      - name: Server log (on failure)
        if: failure()
        working-directory: out
        run: |
          echo "::group::server.log"
          cat server.log || true
          echo "::endgroup::"

      - name: Stop server
        if: always()
        working-directory: out
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" 2>/dev/null || true; fi
