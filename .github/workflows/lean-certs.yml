name: Lean certs

on:
  push:
    branches: [main]
    paths:
      - "proofs/lean/**"
      - "modules/verify/src/main/scala/specrest/verify/cert/**"
      - "modules/cli/src/main/scala/specrest/cli/**"
      - "modules/ir/src/main/scala/specrest/ir/Types.scala"
      - "fixtures/spec/**"
      - ".github/workflows/lean-certs.yml"
  pull_request:
    paths:
      - "proofs/lean/**"
      - "modules/verify/src/main/scala/specrest/verify/cert/**"
      - "modules/cli/src/main/scala/specrest/cli/**"
      - "modules/ir/src/main/scala/specrest/ir/Types.scala"
      - "fixtures/spec/**"
      - ".github/workflows/lean-certs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cert-emit-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - safe_counter
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0

      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22

      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: proofs/lean
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: true

      - name: Compile CLI
        run: sbt "cli/compile"

      - name: Emit certificate bundle for ${{ matrix.fixture }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/cert-${{ matrix.fixture }}
          sbt "cli/run verify --emit-cert /tmp/cert-${{ matrix.fixture }} fixtures/spec/${{ matrix.fixture }}.spec"

      - name: Build certificate bundle with lake
        working-directory: /tmp/cert-${{ matrix.fixture }}
        run: lake build

      - name: Upload bundle on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cert-bundle-${{ matrix.fixture }}
          path: /tmp/cert-${{ matrix.fixture }}/
          if-no-files-found: error
