name: isabelle-build

on:
  push:
    branches: [main]
    paths:
      - "proofs/isabelle/**"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - ".scalafmt.conf"
      - ".github/workflows/isabelle-build.yml"
  pull_request:
    paths:
      - "proofs/isabelle/**"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - ".scalafmt.conf"
      - ".github/workflows/isabelle-build.yml"

env:
  ISABELLE_VERSION: "2025-2"
  ML_OPTIONS: "--minheap 2000 --maxheap 6000 --gcthreads 4"

jobs:
  isabelle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Isabelle distribution (extracted)
        id: cache-isabelle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /opt/Isabelle${{ env.ISABELLE_VERSION }}
          key: isabelle-${{ env.ISABELLE_VERSION }}-linux

      - name: Cache Isabelle tarball (decouples install from upstream)
        if: steps.cache-isabelle.outputs.cache-hit != 'true'
        id: cache-isabelle-tar
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/isabelle-tarball/Isabelle${{ env.ISABELLE_VERSION }}_linux.tar.gz
          key: isabelle-tarball-${{ env.ISABELLE_VERSION }}-linux

      - name: Install Isabelle
        if: steps.cache-isabelle.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/isabelle-tarball
          tar="/tmp/isabelle-tarball/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
          if [ -s "$tar" ]; then
            echo "Cached tarball present ($(stat -c %s "$tar") bytes); skipping download."
          else
            echo "Tarball cache miss; trying download mirrors in order."
            tum="https://isabelle.in.tum.de/website-Isabelle${ISABELLE_VERSION}/dist/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
            gh_release="https://github.com/${GITHUB_REPOSITORY}/releases/download/isabelle-${ISABELLE_VERSION}/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
            for url in "$tum" "$gh_release"; do
              echo "::group::Trying $url"
              if wget --tries=3 --waitretry=15 --retry-connrefused --timeout=60 \
                      -q -O "$tar.partial" "$url"; then
                mv "$tar.partial" "$tar"
                echo "Downloaded from $url ($(stat -c %s "$tar") bytes)"
                echo "::endgroup::"
                break
              fi
              rm -f "$tar.partial"
              echo "Failed; trying next mirror."
              echo "::endgroup::"
            done
            if [ ! -s "$tar" ]; then
              echo "::error::All Isabelle download mirrors failed."
              echo "::error::To enable the GitHub-release fallback, upload"
              echo "::error::Isabelle${ISABELLE_VERSION}_linux.tar.gz as a release asset"
              echo "::error::on this repo with tag 'isabelle-${ISABELLE_VERSION}'."
              exit 1
            fi
          fi
          sudo tar -xzf "$tar" -C /opt/

      - name: Symlink isabelle binary
        run: sudo ln -sf "/opt/Isabelle${ISABELLE_VERSION}/bin/isabelle" /usr/local/bin/isabelle

      - name: Restore Isabelle heaps (two-tier)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: heaps-restore
        with:
          path: ~/.isabelle/Isabelle${{ env.ISABELLE_VERSION }}/heaps
          key: isabelle-heaps-${{ env.ISABELLE_VERSION }}-${{ hashFiles('proofs/isabelle/SpecRest/ROOT', 'proofs/isabelle/SpecRest/IR.thy') }}-${{ hashFiles('proofs/isabelle/SpecRest/*.thy') }}
          restore-keys: |
            isabelle-heaps-${{ env.ISABELLE_VERSION }}-${{ hashFiles('proofs/isabelle/SpecRest/ROOT', 'proofs/isabelle/SpecRest/IR.thy') }}-
            isabelle-heaps-${{ env.ISABELLE_VERSION }}-

      - name: Soft-build pre-flight (skip if no theory work)
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          isabelle build -S -d proofs/isabelle/SpecRest -b SpecRest 2>&1 | tee /tmp/preflight.log
          if grep -q "Nothing to build" /tmp/preflight.log; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "All sessions already up-to-date — skipping rebuild."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build SpecRest session
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          isabelle build \
            -o process_policy="taskset --cpu-list 0-3" \
            -d proofs/isabelle/SpecRest \
            -b SpecRest

      - name: Save Isabelle heaps (push-to-main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.preflight.outputs.needs_build == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.isabelle/Isabelle${{ env.ISABELLE_VERSION }}/heaps
          key: ${{ steps.heaps-restore.outputs.cache-primary-key }}

      - name: Extract per-command timing trace
        shell: bash
        run: |
          set -euo pipefail
          DB="$HOME/.isabelle/Isabelle${ISABELLE_VERSION}/heaps/polyml-5.9.2_x86_64_32-linux/log/SpecRest.db"
          if [ ! -f "$DB" ]; then
            echo "::warning::session DB missing — skipping timing extract"
            exit 0
          fi
          mkdir -p /tmp/isabelle-timing
          BLOB=/tmp/isabelle-timing/cmd.blob
          YXML=/tmp/isabelle-timing/cmd.yxml
          REPORT=/tmp/isabelle-timing/trace.txt
          sqlite3 "$DB" \
            "SELECT writefile('$BLOB', command_timings) FROM isabelle_session_info LIMIT 1" \
            >/dev/null
          zstd -dq -f "$BLOB" -o "$YXML"

          python3 - "$YXML" "$REPORT" <<'PY'
          import os, sys
          from collections import defaultdict
          yxml_path, out_path = sys.argv[1], sys.argv[2]
          with open(yxml_path, 'rb') as fh:
              data = fh.read().decode('utf-8', errors='replace')
          entries = []
          for chunk in data.split('\x05'):
              if not chunk:
                  continue
              fields = {}
              for kv in chunk.split('\x06'):
                  if '=' in kv:
                      k, v = kv.split('=', 1)
                      fields[k] = v
              if 'elapsed' in fields and 'file' in fields:
                  try:
                      entries.append((
                          float(fields['elapsed']),
                          fields.get('name', '?'),
                          fields.get('file', '?'),
                          int(fields.get('offset', '0'))
                      ))
                  except ValueError:
                      pass
          cache = {}
          def line_of(path, off):
              exp = path.replace('~~', os.environ.get('ISABELLE_HOME', '/opt/Isabelle2025-2')) \
                        .replace('~/', os.environ.get('HOME', '') + '/')
              if exp not in cache:
                  try:
                      with open(exp, 'rb') as fh:
                          cache[exp] = fh.read()
                  except OSError:
                      cache[exp] = None
              if cache[exp] is None:
                  return -1
              return cache[exp][:off].count(b'\n') + 1
          with open(out_path, 'w') as fh:
              fh.write(f"Total commands at or above build_timing_threshold (0.1s default): {len(entries)}\n\n")
              fh.write("=== Top 30 slowest commands ===\n")
              for elapsed, name, path, off in sorted(entries, key=lambda x: -x[0])[:30]:
                  ln = line_of(path, off)
                  file = path.split('/')[-1]
                  where = f"{file}:{ln}" if ln > 0 else f"{file}:?  (off={off})"
                  fh.write(f"  {elapsed:7.2f}s  {name:14s}  {where}\n")
              by_file = defaultdict(lambda: [0.0, 0])
              for elapsed, name, path, off in entries:
                  by_file[path.split('/')[-1]][0] += elapsed
                  by_file[path.split('/')[-1]][1] += 1
              fh.write("\n=== Cumulated by file (descending) ===\n")
              for fn, (total, cnt) in sorted(by_file.items(), key=lambda x: -x[1][0]):
                  fh.write(f"  {total:7.2f}s ({cnt:5d} cmds)  {fn}\n")
          PY

          echo "::group::Isabelle per-command timing trace"
          cat "$REPORT"
          echo "::endgroup::"

      - name: Upload timing trace artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: isabelle-timing-trace
          path: /tmp/isabelle-timing/
          retention-days: 30
          if-no-files-found: ignore

      - name: Smoke-check no sorry / oops
        run: |
          if grep -rnE "\b(sorry|oops)\b" proofs/isabelle/SpecRest/*.thy; then
            echo "::error::sorry or oops found in Isabelle theories"
            exit 1
          fi

      - name: Set up scalafmt for codegen drift check
        uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
        with:
          apps: scalafmt:3.8.3

      - name: Detect Scala extraction drift
        run: |
          set -euo pipefail
          target="modules/ir/src/main/scala/specrest/ir/generated/SpecRestGenerated.scala"
          work="$(mktemp -d)"
          isabelle export -d proofs/isabelle/SpecRest -O "$work/export" \
            -x 'SpecRest.Codegen:code/*' SpecRest >/dev/null
          exported="$work/export/SpecRest.Codegen/code/SpecRestGenerated.scala"
          out="$work/SpecRestGenerated.scala"
          {
            printf 'package specrest.ir.generated\n\nimport scala.annotation.nowarn\n\n@nowarn\n'
            cat "$exported"
          } > "$out"
          scalafmt --config .scalafmt.conf --non-interactive "$out" >/dev/null
          if ! diff -u "$target" "$out"; then
            echo "::error::$target is out of sync with proofs/isabelle/SpecRest."
            echo "::error::Re-run the extraction (see proofs/isabelle/README.md → Regenerating SpecRestGenerated.scala) and commit the diff."
            exit 1
          fi
          echo "OK: $target matches the freshly-extracted Scala."
