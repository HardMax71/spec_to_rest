name: isabelle-build

on:
  push:
    branches: [main]
    paths:
      - "proofs/isabelle/**"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - ".scalafmt.conf"
      - ".github/workflows/isabelle-build.yml"
  pull_request:
    paths:
      - "proofs/isabelle/**"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - ".scalafmt.conf"
      - ".github/workflows/isabelle-build.yml"

env:
  ISABELLE_VERSION: "2025-2"
  ML_OPTIONS: "--minheap 2000 --maxheap 6000 --gcthreads 4"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  isabelle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Isabelle distribution (extracted)
        id: cache-isabelle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /opt/Isabelle${{ env.ISABELLE_VERSION }}
          key: isabelle-${{ env.ISABELLE_VERSION }}-linux

      - name: Cache Isabelle tarball (decouples install from upstream)
        if: steps.cache-isabelle.outputs.cache-hit != 'true'
        id: cache-isabelle-tar
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/isabelle-tarball/Isabelle${{ env.ISABELLE_VERSION }}_linux.tar.gz
          key: isabelle-tarball-${{ env.ISABELLE_VERSION }}-linux

      - name: Install Isabelle
        if: steps.cache-isabelle.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/isabelle-tarball
          tar="/tmp/isabelle-tarball/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
          if [ -s "$tar" ]; then
            echo "Cached tarball present ($(stat -c %s "$tar") bytes); skipping download."
          else
            echo "Tarball cache miss; trying download mirrors in order."
            tum="https://isabelle.in.tum.de/website-Isabelle${ISABELLE_VERSION}/dist/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
            cam="https://www.cl.cam.ac.uk/research/hvg/Isabelle/dist/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
            gh_release="https://github.com/${GITHUB_REPOSITORY}/releases/download/isabelle-${ISABELLE_VERSION}/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
            err="$(mktemp)"
            for url in "$tum" "$cam" "$gh_release"; do
              echo "::group::Trying $url"
              rc=0
              curl -4 --fail --location --show-error \
                   --connect-timeout 60 --max-time 1200 \
                   --retry 3 --retry-delay 15 --retry-connrefused \
                   --user-agent "Mozilla/5.0 (isabelle-build-ci)" \
                   --output "$tar.partial" "$url" 2>"$err" || rc=$?
              if [ "$rc" -eq 0 ] && [ -s "$tar.partial" ]; then
                mv "$tar.partial" "$tar"
                echo "Downloaded from $url ($(stat -c %s "$tar") bytes)"
                echo "::endgroup::"
                break
              fi
              rm -f "$tar.partial"
              echo "Failed (curl exit $rc); curl stderr (last 20 lines):"
              tail -n 20 "$err" || true
              echo "Trying next mirror."
              echo "::endgroup::"
            done
            rm -f "$err"
            if [ ! -s "$tar" ]; then
              echo "::error::All Isabelle download mirrors failed."
              echo "::error::To enable the GitHub-release fallback, upload"
              echo "::error::Isabelle${ISABELLE_VERSION}_linux.tar.gz as a release asset"
              echo "::error::on this repo with tag 'isabelle-${ISABELLE_VERSION}'."
              exit 1
            fi
          fi
          sudo tar -xzf "$tar" -C /opt/

      - name: Symlink isabelle binary
        run: sudo ln -sf "/opt/Isabelle${ISABELLE_VERSION}/bin/isabelle" /usr/local/bin/isabelle

      - name: Restore Isabelle heaps (two-tier)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: heaps-restore
        with:
          path: ~/.isabelle/Isabelle${{ env.ISABELLE_VERSION }}/heaps
          key: isabelle-heaps-${{ env.ISABELLE_VERSION }}-${{ hashFiles('proofs/isabelle/SpecRest/ROOT', 'proofs/isabelle/SpecRest/core/IR.thy') }}-${{ hashFiles('proofs/isabelle/SpecRest/**/*.thy') }}
          restore-keys: |
            isabelle-heaps-${{ env.ISABELLE_VERSION }}-${{ hashFiles('proofs/isabelle/SpecRest/ROOT', 'proofs/isabelle/SpecRest/core/IR.thy') }}-
            isabelle-heaps-${{ env.ISABELLE_VERSION }}-

      - name: Build SpecRest sessions (source-change gated, parallel)
        id: build
        shell: bash
        run: |
          set -euo pipefail
          isabelle build -S -b -j 2 \
            -o process_policy="taskset --cpu-list 0-3" \
            -d proofs/isabelle/SpecRest \
            SpecRest_Soundness SpecRest_Codegen 2>&1 | tee /tmp/build.log
          if grep -q "Nothing to build" /tmp/build.log; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "All sessions already up-to-date; skipping heap save."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save Isabelle heaps (push-to-main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.build.outputs.needs_build == 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.isabelle/Isabelle${{ env.ISABELLE_VERSION }}/heaps
          key: ${{ steps.heaps-restore.outputs.cache-primary-key }}

      - name: Extract per-command timing trace (all project sessions)
        shell: bash
        run: |
          set -euo pipefail
          HEAPS="$HOME/.isabelle/Isabelle${ISABELLE_VERSION}/heaps"
          if ! ls "$HEAPS"/*/log/*.db >/dev/null 2>&1; then
            echo "::warning::no session DBs under $HEAPS - skipping timing extract"
            exit 0
          fi
          mkdir -p /tmp/isabelle-timing
          ISABELLE_HOME="$(isabelle getenv -b ISABELLE_HOME 2>/dev/null || true)"
          export ISABELLE_HOME
          python3 proofs/isabelle/timing_trace.py \
            "$HEAPS" proofs/isabelle/SpecRest /tmp/isabelle-timing/trace.txt
          echo "::group::Isabelle per-command timing trace (all project sessions)"
          cat /tmp/isabelle-timing/trace.txt
          echo "::endgroup::"

      - name: Upload timing trace artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: isabelle-timing-trace
          path: /tmp/isabelle-timing/
          retention-days: 30
          if-no-files-found: ignore

      - name: Smoke-check no sorry / oops
        run: |
          if grep -rnE "\b(sorry|oops)\b" --include='*.thy' proofs/isabelle/SpecRest; then
            echo "::error::sorry or oops found in Isabelle theories"
            exit 1
          fi

      - name: Set up scalafmt for codegen drift check
        uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
        with:
          apps: scalafmt:3.8.3

      - name: Detect Scala extraction drift
        run: |
          set -euo pipefail
          target="modules/ir/src/main/scala/specrest/ir/generated/SpecRestGenerated.scala"
          work="$(mktemp -d)"
          isabelle export -d proofs/isabelle/SpecRest -O "$work/export" \
            -x 'SpecRest_Codegen.Codegen:code/*' SpecRest_Codegen >/dev/null
          exported="$work/export/SpecRest_Codegen.Codegen/code/SpecRestGenerated.scala"
          out="$work/SpecRestGenerated.scala"
          {
            printf 'package specrest.ir.generated\n\n'
            cat "$exported"
          } > "$out"
          scalafmt --config .scalafmt.conf --non-interactive "$out" >/dev/null
          if ! diff -u "$target" "$out"; then
            echo "::error::$target is out of sync with proofs/isabelle/SpecRest."
            echo "::error::Re-run the extraction (see proofs/isabelle/README.md → Regenerating SpecRestGenerated.scala) and commit the diff."
            exit 1
          fi
          echo "OK: $target matches the freshly-extracted Scala."
