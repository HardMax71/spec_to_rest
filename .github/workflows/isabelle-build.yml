name: isabelle-build

on:
  push:
    branches: [main]
    paths:
      - "proofs/isabelle/**"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - ".scalafmt.conf"
      - ".github/workflows/isabelle-build.yml"
  pull_request:
    paths:
      - "proofs/isabelle/**"
      - "modules/ir/src/main/scala/specrest/ir/generated/**"
      - ".scalafmt.conf"
      - ".github/workflows/isabelle-build.yml"

jobs:
  isabelle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Isabelle distribution
        id: cache-isabelle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /opt/Isabelle2025-2
          key: isabelle-2025-2-linux

      - name: Install Isabelle2025-2
        if: steps.cache-isabelle.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget -q https://isabelle.in.tum.de/website-Isabelle2025-2/dist/Isabelle2025-2_linux.tar.gz
          sudo tar -xzf Isabelle2025-2_linux.tar.gz -C /opt/

      - name: Symlink isabelle binary
        run: sudo ln -sf /opt/Isabelle2025-2/bin/isabelle /usr/local/bin/isabelle

      - name: Cache Isabelle heaps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.isabelle/Isabelle2025-2/heaps
          key: isabelle-heaps-${{ hashFiles('proofs/isabelle/SpecRest/ROOT', 'proofs/isabelle/SpecRest/*.thy') }}
          restore-keys: |
            isabelle-heaps-

      - name: Build SpecRest session
        run: isabelle build -d proofs/isabelle/SpecRest -b SpecRest

      - name: Smoke-check no sorry / oops
        run: |
          if grep -rnE "\b(sorry|oops)\b" proofs/isabelle/SpecRest/*.thy; then
            echo "::error::sorry or oops found in Isabelle theories"
            exit 1
          fi

      - name: Set up scalafmt for codegen drift check
        uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
        with:
          apps: scalafmt:3.8.3

      - name: Detect Scala extraction drift
        run: |
          set -euo pipefail
          target="modules/ir/src/main/scala/specrest/ir/generated/SpecRestGenerated.scala"
          work="$(mktemp -d)"
          isabelle export -d proofs/isabelle/SpecRest -O "$work/export" \
            -x 'SpecRest.Codegen:code/*' SpecRest >/dev/null
          exported="$work/export/SpecRest.Codegen/code/SpecRestGenerated.scala"
          out="$work/SpecRestGenerated.scala"
          {
            printf 'package specrest.ir.generated\n\nimport scala.annotation.nowarn\n\n@nowarn\n'
            cat "$exported"
          } > "$out"
          scalafmt --config .scalafmt.conf --non-interactive "$out" >/dev/null
          if ! diff -u "$target" "$out"; then
            echo "::error::$target is out of sync with proofs/isabelle/SpecRest."
            echo "::error::Re-run the extraction (see proofs/isabelle/README.md → Regenerating SpecRestGenerated.scala) and commit the diff."
            exit 1
          fi
          echo "OK: $target matches the freshly-extracted Scala."
