repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        types_or: [markdown]

      - id: scalafmt
        name: scalafmt
        entry: scalafmt
        language: system
        files: \.(scala|sbt|sc)$
        require_serial: true

      - id: forbid-question-mark-placeholder
        name: forbid ??? placeholder in Scala sources
        entry: bash -c 'grep -nE "(^|[^a-zA-Z_])\?\?\?" -- "$@" >&2; rc=$?; if [ "$rc" -eq 0 ]; then echo "remove ??? placeholders before committing" >&2; exit 1; fi; [ "$rc" -eq 1 ]' --
        language: system
        files: \.(scala|sc)$

      - id: isabelle-build
        name: isabelle build SpecRest
        entry: bash -c 'if ! command -v isabelle >/dev/null 2>&1; then echo "isabelle not on PATH; install Isabelle2025-2 (see proofs/isabelle/README.md) so this hook can verify proofs locally. Skipping is not allowed once you touch proofs/isabelle/**." >&2; exit 1; fi; isabelle build -d proofs/isabelle/SpecRest -j 4 SpecRest'
        language: system
        files: ^proofs/isabelle/SpecRest/.*\.(thy|toml|ROOT)$
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint-docker

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^(fixtures/golden/|modules/cli/src/main/resources/META-INF/native-image/)
      - id: trailing-whitespace
        exclude: ^(fixtures/golden/|modules/cli/src/main/resources/META-INF/native-image/)
