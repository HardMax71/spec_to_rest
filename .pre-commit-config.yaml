repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        types_or: [markdown]

      - id: scalafmt
        name: scalafmt
        entry: scalafmt
        language: system
        files: \.(scala|sbt|sc)$
        require_serial: true

      - id: forbid-question-mark-placeholder
        name: forbid ??? placeholder in Scala sources
        entry: bash -c 'if grep -nE "(^|[^a-zA-Z_])\?\?\?" "$@" >&2; then echo "remove ??? placeholders before committing" >&2; exit 1; fi' --
        language: system
        files: \.(scala|sc)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint-docker

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^(fixtures/golden/|modules/cli/src/main/resources/META-INF/native-image/)
      - id: trailing-whitespace
        exclude: ^(fixtures/golden/|modules/cli/src/main/resources/META-INF/native-image/)
